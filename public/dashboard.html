<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="notifications.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
</head>
<body>
  <h1>Welcome to Task Manager</h1>
  <p id="user-email"></p> 
  <label class="switch">
    <input type="checkbox" id="modeToggle" class="input">
    <span class="slider"></span>
    <span class="sun">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g fill="#ffd43b">
          <circle r="5" cy="12" cx="12"></circle>
          <path d="m21 13h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm-17 0h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm13.66-5.66a1 1 0 0 1-.66-.29 1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.41l-.71.71a1 1 0 0 1-.75.29zm-12.02 12.02a1 1 0 0 1-.71-.29 1 1 0 0 1 0-1.41l.71-.66a1 1 0 0 1 1.41 1.41l-.71.71a1 1 0 0 1-.7.24zm6.36-14.36a1 1 0 0 1-1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1-1 1zm0 17a1 1 0 0 1-1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1-1 1zm-5.66-14.66a1 1 0 0 1-.7-.29l-.71-.71a1 1 0 0 1 1.41-1.41l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1-.71.29zm12.02 12.02a1 1 0 0 1-.7-.29l-.66-.71a1 1 0 0 1 1.36-1.36l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1-.71.24z"></path>
        </g>
      </svg>
    </span>
    <span class="moon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
        <path d="m223.5 32c-123.5 0-223.5 100.3-223.5 224s100 224 223.5 224c60.6 0 115.5-24.2 155.8-63.4 5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6-96.9 0-175.5-78.8-175.5-176 0-65.8 36-123.1 89.3-153.3 6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"></path>
      </svg>
    </span>
  </label> 

  <button class="logout-btn" title="Logout" id="logout">
    <i class="fas fa-sign-out-alt"></i> Logout
  </button> 

  <div class="top-bar">
    <button class="add-btn" title="Add New Task" onclick="openModal()">
      <i class="fas fa-plus"></i> Add Task
    </button>
  </div>

  <div class="search-section task-actions">
    <input id="searchQuery" placeholder="Search by ID or keyword">
    <button class="SearchBtn search-refresh-buttons" title="Search for Task" onclick="searchTasks()">Search</button> 
    <button class="search-refresh-buttons" type="submit" title="Refresh Page" onClick="refreshPage()">Refresh</button>
  </div>

  <div class="board">
    <div class="column" id="Tasks Ready"><h2><span class="count" id="count-Tasks Ready">0</span> Tasks Ready</h2></div>
    <div class="column" id="In Progress"><h2><span class="count" id="count-In Progress">0</span> In Progress</h2></div>
    <div class="column" id="Needs Review"><h2><span class="count" id="count-Needs Review">0</span> Needs Review</h2></div>
    <div class="column" id="Done"><h2><span class="count" id="count-Done">0</span> Done</h2></div>
  </div>
 
<div id="taskModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Task Details</div>

    <input type="hidden" id="taskId">

    <label>Title</label>
    <input id="title" placeholder="Title">
    <label>Description</label>
    <textarea id="description" placeholder="Description"></textarea>
    <label>Status</label>
    <select id="status">
      <option value="Tasks Ready">Tasks Ready</option>
      <option value="In Progress">In Progress</option>
      <option value="Needs Review">Needs Review</option>
      <option value="Done">Done</option>
    </select>
    <label>Due Date</label>
    <input id="due_datetime" type="datetime-local">

    <div class="modal-buttons">
      <button class="close-btn" title="Close Popup" onclick="closeModal()">Close</button>
      <button class="save-btn" title="Save Task" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>
 
  <div id="notification-container"></div>
  <script type="module" src="./logout.js"></script>  
  <script>
    function openModal() {
    clearForm();

    const modal = document.getElementById('taskModal');
  
    modal.style.display = 'flex';                   
    modal.style.justifyContent = 'center';          
    modal.style.alignItems = 'center';              
    modal.style.position = 'fixed';                  
    modal.style.top = '0';
    modal.style.left = '0';
    modal.style.width = '100%';
    modal.style.height = '100%';
    modal.style.backgroundColor = 'rgba(0,0,0,0.5)';  
    modal.style.zIndex = '9999';                     
  
  }

    function closeModal() {
      const modal = document.getElementById('taskModal');
      modal.style.display = 'none';
       
      document.body.style.overflow = '';
    }
 
    window.onclick = function(event) {
      const modal = document.getElementById("taskModal");
      if (event.target === modal) {
        closeModal();
      }
    }
  </script>
  <script>
  statuses.forEach(status => {
  const column = document.getElementById(status);
  column.innerHTML = `<h2><span class="count" id="count-${status}">0</span> ${status}</h2>`;
  taskCounts[status] = 0;
 
  column.addEventListener('dragover', e => e.preventDefault());
 
  column.addEventListener('dragenter', () => column.classList.add('drag-over'));
  column.addEventListener('dragleave', () => column.classList.remove('drag-over'));
 
  column.addEventListener('drop', async e => {
    e.preventDefault();
    column.classList.remove('drag-over');  

    if (!draggedTaskId) return;
    const newStatus = column.id;
 
    const draggedCard = document.querySelector('.task-card.dragging');
    if (draggedCard) {
      draggedCard.style.transform = "scale(1.1)";
      draggedCard.style.opacity = "0.4";
    }
 
    await fetch(`${API}/${draggedTaskId}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status: newStatus })
    });

    draggedTaskId = null;
    setTimeout(() => loadTasks(), 200);  
  });
});
  </script>
  <script type="module">
    import { supabase } from './supabase.js';
    document.getElementById('logout')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
    });
  </script>

  <script>
    
    const API = '/tasks';
    let draggedTaskId = null;

    window.addEventListener("DOMContentLoaded", () => { 
      if(localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('modeToggle').checked = true;
      }

      document.getElementById('modeToggle').addEventListener('change', e => {
        document.body.classList.toggle('dark-mode', e.target.checked);
        localStorage.setItem('darkMode', e.target.checked);
      });

      loadTasks();
    });

    function refreshPage(){ 
      window.location.reload(); 
    }

    async function loadTasks() {
      const res = await fetch(API);
      const tasks = await res.json();
      displayTasks(tasks);
    }

    function displayTasks(tasks) {
      const statuses = ["Tasks Ready", "In Progress", "Needs Review", "Done"];
      const taskCounts = {};

      statuses.forEach(status => {
        const column = document.getElementById(status);
        column.innerHTML = `<h2><span class="count" id="count-${status}">0</span> ${status}</h2>`;
        taskCounts[status] = 0;

        column.addEventListener('dragover', e => e.preventDefault());
        column.addEventListener('drop', async e => {
          e.preventDefault();
          if (!draggedTaskId) return;
          const newStatus = column.id;
          await fetch(`${API}/${draggedTaskId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ status: newStatus })
          });
          draggedTaskId = null;
          loadTasks();
        });
      });

      const today = new Date().toISOString().split('T')[0];
      const notificationContainer = document.getElementById('notification-container');
      notificationContainer.innerHTML = '';

      tasks.forEach(task => {
        const card = document.createElement("div");
        card.className = "task-card";
        card.draggable = true;
        card.dataset.id = task.task_id;
        card.innerHTML = `
          <div class="task-meta">
          <h3>${task.title}</h3>
          <p title="${task.description}">${task.description}</p>
          <div class="task-meta">Due: ${new Date(task.due_datetime).toLocaleString()}</div>
          <div class="task-meta">ID: ${task.task_id}</div>
          <div class="task-actions">
            <button class="copy-btn" title="Copy ID" onclick="copyTaskId('${task.task_id}')">Copy ID</button>
            <button class="edit-btn" title="Edit Task" onclick="editTask('${task.task_id}')">Edit</button>
            <button class="delete-btn" title="Delete Task" onclick="deleteTask('${task.task_id}')">Delete</button>
          </div>
        </div>
        `;

        card.addEventListener('dragstart', () => {
          card.classList.add('dragging');
          draggedTaskId = card.dataset.id; 
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));

  if (document.getElementById(task.status)) {
    document.getElementById(task.status).appendChild(card);
    taskCounts[task.status]++;
  }
 
  const taskDueDate = new Date(task.due_datetime).toISOString().split('T')[0];
  if (taskDueDate === today) {
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.textContent = `Task "${task.title}" is due today!`;
      notificationContainer.appendChild(notif);
      setTimeout(() => notif.remove(), 5000);
    }
  });
 
  for (const status of statuses) {
    document.getElementById(`count-${status}`).textContent = taskCounts[status];
    }
  }
 
 function openModal() {
  clearForm();

  const modal = document.getElementById('taskModal');
 
  modal.style.display = 'flex';                   
  modal.style.justifyContent = 'center';          
  modal.style.alignItems = 'center';              
  modal.style.position = 'fixed';                  
  modal.style.top = '0';
  modal.style.left = '0';
  modal.style.width = '100%';
  modal.style.height = '100%';
  modal.style.backgroundColor = 'rgba(0,0,0,0.5)';  
  modal.style.zIndex = '9999';                     
 
}
  

  function clearForm() {
    document.getElementById("taskId").value = '';
    document.getElementById("title").value = '';
    document.getElementById("description").value = '';
    document.getElementById("status").value = 'Tasks Ready';
    document.getElementById("due_datetime").value = '';
  }

  function closeModal() {
    document.getElementById('taskModal').style.display = 'none';
  }

  async function saveTask() {
  const id = document.getElementById("taskId").value.trim();
  const dueDateInput = document.getElementById("due_datetime").value;
  const dueDate = new Date(dueDateInput);
  const now = new Date();

  if (!dueDateInput || dueDate <= now) {
    alert("Due date must be in the future.");
    return;
  }

  const data = {
  title: document.getElementById("title").value.trim(),
  description: document.getElementById("description").value.trim(),
  status: document.getElementById("status").value,
  due_datetime: dueDateInput
  };

  try {
  if (id) {
    await fetch(`${API}/${id}`, {
      method: "PUT",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } else {
    await fetch(API, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  }

  closeModal();
      loadTasks();
    } catch (err) {
      console.error(err);
    }
  }

  async function editTask(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    if (!res.ok) throw new Error("Task not found");
    const task = await res.json();
 
    document.getElementById("taskId").value = task.task_id;
    document.getElementById("title").value = task.title;
    document.getElementById("description").value = task.description;
    document.getElementById("status").value = task.status;
 
    const dueDate = new Date(task.due_datetime);
    const tzOffset = dueDate.getTimezoneOffset() * 60000;
    const localDate = new Date(dueDate.getTime() - tzOffset);
    document.getElementById("due_datetime").value = localDate.toISOString().slice(0,16);
 
    const modal = document.getElementById('taskModal');
    modal.style.display = 'flex'; 
  } catch (err) {
    console.error(err);
    alert("Failed to load task for editing.");
  }
}

async function deleteTask(id) {
  if (confirm("Are you sure you want to delete this task?")) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  loadTasks();
  }
}

async function searchTasks() {
  const q = document.getElementById("searchQuery").value.trim();
  if (!q) return loadTasks();

  const res = await fetch(`/search?q=${q}`);
    const results = await res.json();
    displayTasks(results);
  }

  function copyTaskId(taskId) {
    navigator.clipboard.writeText(taskId);
  }
 
  window.onclick = function(event) {
    const modal = document.getElementById("taskModal");
    if (event.target === modal) {
    closeModal();
    }
  }
  </script>
  </body>
</html>
